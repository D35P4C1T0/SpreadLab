[package]
name = "spreadlab-rs"
version = "0.1.0"
edition = "2021"
rust-version = "1.75"
license = "MIT"
description = "Alpha Pokemon Champions Stat Point optimizer with CLI and optional WebUI"
repository = "https://github.com/D35P4C1T0/SpreadLab"
homepage = "https://github.com/D35P4C1T0/SpreadLab"
readme = "README.md"
keywords = ["pokemon", "champions", "optimizer", "vgc"]
categories = ["command-line-utilities", "web-programming::http-server"]

[dependencies]
anyhow = "1"
axum = { version = "0.7", optional = true }
clap = { version = "4", features = ["derive"] }
directories = "5"
flate2 = "1"
reqwest = { version = "0.12", features = ["blocking", "json", "rustls-tls"], default-features = false }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net"], optional = true }
tower-http = { version = "0.6", features = ["trace"], optional = true }
tracing = { version = "0.1", optional = true }
tracing-subscriber = { version = "0.3", features = ["env-filter"], optional = true }
damage_calc = { package = "pkmn-dmg-lib", git = "https://github.com/D35P4C1T0/pkmn-dmg-lib-rs.git", features = ["serde"] }

[features]
default = []
webui = ["axum", "tokio", "tower-http", "tracing", "tracing-subscriber"]

[dev-dependencies]
tempfile = "3"
