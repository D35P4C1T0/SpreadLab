<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpreadLab</title>
    <link rel="stylesheet" href="/app.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>SpreadLab</h1>
        <p>[Gen 9 Champions] VGC 2026 Reg M-A (Bo3)</p>
      </div>
      <div id="status" class="status">Ready</div>
    </header>

    <main class="shell">
      <section class="bench">
        <div class="panel">
          <div class="panel-head">
            <h2>Attacker</h2>
            <button type="button" id="sample-attacker">Sample</button>
          </div>
          <textarea id="attacker-set" spellcheck="false"></textarea>
        </div>

        <div class="field-panel">
        <div class="field-head">
          <h2>Field</h2>
          <span id="field-note"></span>
        </div>
        <div class="field-body">
          <div class="field-row center">
            <div class="seg" data-field-key="format">
              <button type="button" data-value="Singles">Singles</button>
              <button type="button" data-value="Doubles" class="active">Doubles</button>
            </div>
          </div>
          <div class="field-row center">
            <div class="seg" data-field-key="terrain">
              <button type="button" data-value="None" class="active">None</button>
              <button type="button" data-value="Electric">Electric</button>
              <button type="button" data-value="Grassy">Grassy</button>
              <button type="button" data-value="Misty">Misty</button>
              <button type="button" data-value="Psychic">Psychic</button>
            </div>
          </div>
          <div class="field-row center">
            <div class="seg" data-field-key="weather">
              <button type="button" data-value="None" class="active">None</button>
              <button type="button" data-value="Sun">Sun</button>
              <button type="button" data-value="Rain">Rain</button>
              <button type="button" data-value="Sand">Sand</button>
              <button type="button" data-value="Snow">Snow</button>
            </div>
          </div>
          <div class="field-row center">
            <button type="button" class="pill toggle" data-field-bool="fairy_aura">Fairy Aura</button>
            <button type="button" class="pill toggle" data-field-bool="gravity">Gravity</button>
          </div>

          <div class="side-grid">
            <div class="side-col">
              <button type="button" class="pill unsupported" data-unsupported="attacker Protect">Protect</button>
              <button type="button" class="pill toggle" data-field-bool="helping_hand">Helping Hand</button>
              <button type="button" class="pill unsupported" data-unsupported="attacker Aurora Veil">Aurora Veil</button>
              <div class="seg compact">
                <button type="button" class="unsupported" data-unsupported="attacker Reflect">Reflect</button>
                <button type="button" class="unsupported" data-unsupported="attacker Light Screen">Light Screen</button>
              </div>
              <button type="button" class="pill toggle" data-field-bool="attacker_tailwind">Tailwind</button>
              <button type="button" class="pill unsupported" data-unsupported="attacker Friend Guard">Friend Guard</button>
              <button type="button" class="pill unsupported" data-unsupported="attacker Stealth Rock">Stealth Rock</button>
              <div class="seg compact unsupported-seg" data-unsupported="attacker Spikes">
                <button type="button" class="active">0</button>
                <button type="button">1</button>
                <button type="button">2</button>
                <button type="button">3 Spikes</button>
              </div>
              <button type="button" class="pill unsupported" data-unsupported="attacker Salt Cure">Salt Cure</button>
            </div>

            <div class="side-col">
              <button type="button" class="pill toggle" data-field-bool="protect">Protect</button>
              <button type="button" class="pill unsupported" data-unsupported="defender Helping Hand">Helping Hand</button>
              <button type="button" class="pill toggle" data-field-bool="defender_aurora_veil">Aurora Veil</button>
              <div class="seg compact">
                <button type="button" data-field-bool="defender_reflect">Reflect</button>
                <button type="button" data-field-bool="defender_light_screen">Light Screen</button>
              </div>
              <button type="button" class="pill toggle" data-field-bool="defender_tailwind">Tailwind</button>
              <button type="button" class="pill toggle" data-field-bool="defender_friend_guard">Friend Guard</button>
              <button type="button" class="pill unsupported" data-unsupported="defender Stealth Rock">Stealth Rock</button>
              <div class="seg compact unsupported-seg" data-unsupported="defender Spikes">
                <button type="button" class="active">0</button>
                <button type="button">1</button>
                <button type="button">2</button>
                <button type="button">3 Spikes</button>
              </div>
              <button type="button" class="pill unsupported" data-unsupported="defender Salt Cure">Salt Cure</button>
            </div>
          </div>
        </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h2>Defender</h2>
            <button type="button" id="sample-defender">Sample</button>
          </div>
          <textarea id="defender-set" spellcheck="false"></textarea>
        </div>
      </section>

      <section class="controls">
        <div class="tabs" role="tablist">
          <button class="tab active" data-mode="damage" type="button">Damage</button>
          <button class="tab" data-mode="survive" type="button">Defensive min</button>
          <button class="tab" data-mode="ko" type="button">Offensive KO</button>
          <button class="tab" data-mode="ranked" type="button">Ranked optimize</button>
        </div>

        <div class="grid">
          <label>
            Move
            <input id="move-name" list="move-list" value="Iron Head" />
          </label>
          <label>
            Move times affected
            <input id="move-times" type="number" min="0" max="20" value="0" />
          </label>
          <label data-field="survive">
            Max KO chance
            <input id="max-ko" type="number" min="0" max="1" step="0.001" value="0.125" />
          </label>
          <label data-field="ko">
            Min KO chance
            <input id="min-ko" type="number" min="0" max="1" step="0.001" value="1" />
          </label>
          <label data-field="survive">
            Current HP %
            <input id="hp-percent" type="number" min="1" max="100" step="1" value="100" />
          </label>
          <label>
            Limit
            <input id="limit" type="number" min="1" max="100" value="10" />
          </label>
          <label>
            Nature
            <select id="nature">
              <option value="">Any</option>
            </select>
          </label>
          <label class="check">
            <input id="optimize-nature" type="checkbox" checked />
            Optimize nature
          </label>
          <label class="check" data-field="ranked">
            <input id="full-spend" type="checkbox" />
            Full spend
          </label>
          <label data-field="ranked">
            Optimize
            <select id="ranked-mode">
              <option value="defensive">Defensive</option>
              <option value="offensive">Offensive</option>
            </select>
          </label>
        </div>

        <div class="locks" data-field="ranked">
          <label>HP <input data-lock="hp" type="number" min="0" max="32" placeholder="-" /></label>
          <label>Atk <input data-lock="attack" type="number" min="0" max="32" placeholder="-" /></label>
          <label>Def <input data-lock="defense" type="number" min="0" max="32" placeholder="-" /></label>
          <label>SpA <input data-lock="special_attack" type="number" min="0" max="32" placeholder="-" /></label>
          <label>SpD <input data-lock="special_defense" type="number" min="0" max="32" placeholder="-" /></label>
          <label>Spe <input data-lock="speed" type="number" min="0" max="32" placeholder="-" /></label>
        </div>

        <div class="actions">
          <button id="run" type="button">Run</button>
          <button id="swap" type="button">Swap</button>
          <button id="clear" type="button">Clear</button>
        </div>
      </section>

      <section class="results">
        <div class="results-head">
          <h2>Results</h2>
          <span id="summary"></span>
        </div>
        <div id="output" class="output"></div>
      </section>
    </main>

    <datalist id="move-list"></datalist>
    <script src="/app.js"></script>
  </body>
</html>
